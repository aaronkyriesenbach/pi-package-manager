on:
  push:
    branches: ['**']

jobs:
  # NOTE: release-please's own PR (and its merge, when triggered via the
  # merge button/API rather than a raw push) is authored by GITHUB_TOKEN,
  # so GitHub's loop-prevention rule means this workflow never runs on that
  # PR's branch. That's fine: master has no required-status-check branch
  # rule, and npm-publish/docker independently re-check
  # `needs.checks.result == 'success'` against the real merge commit, so a
  # broken build still can't get published even though the PR itself never
  # shows a green check.
  checks:
    name: Typecheck, lint, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage

  release-please:
    if: github.ref_name == 'master'
    uses: aaronkyriesenbach/workflows/.github/workflows/release-please.yaml@master
    permissions:
      contents: write
      pull-requests: write

  npm-publish:
    needs: [checks, release-please]
    if: >
      always() && needs.checks.result == 'success' &&
      (github.ref_name != 'master' ||
        needs.release-please.outputs.release_created == 'true')
    uses: aaronkyriesenbach/workflows/.github/workflows/npm-build-push.yaml@master
    secrets:
      npm-token: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
      id-token: write
